  var catLabels = Object.keys(catCounts); var catValues = catLabels.map(function(k){return catCounts[k]});
  var catClrs = catLabels.map(function(k){return catColors[k]||'#6366f1'});
  donut('chart-category', catLabels, catValues, catClrs);

  var typeLabels = Object.keys(typeCounts); var typeValues = typeLabels.map(function(k){return typeCounts[k]});
  var typeClrs = typeLabels.map(function(k){return typeColors[k]||'#6366f1'});
  donut('chart-type', typeLabels, typeValues, typeClrs);

  var compLabels = Object.keys(compCounts).sort(function(a,b){return compCounts[b]-compCounts[a]});
  var compValues = compLabels.map(function(k){return compCounts[k]});
  var compClrs = ['#6366f1','#818cf8','#a78bfa','#c4b5fd','#22c55e','#4ade80','#86efac','#f59e0b','#fbbf24','#fcd34d','#ef4444','#f87171','#3b82f6','#60a5fa','#14b8a6','#2dd4bf','#8b5cf6'];
  donut('chart-competitor', compLabels, compValues, compClrs.slice(0, compLabels.length));

  // Render cards
  function render() {
    var fc = selCat.value, fco = selComp.value, ft = selType.value;
    var filtered = DATA.filter(function(a) {
      if (fc && a.category !== fc) return false;
      if (fco && a.competitor !== fco) return false;
      if (ft && a.type !== ft) return false;
      return true;
    });
    var container = document.getElementById('announcements');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-results"><div class="icon">&#128269;</div><div>No announcements match your filters</div></div>';
      return;
    }
    var html = '';
    filtered.forEach(function(a, i) {
      var idx = DATA.indexOf(a);
      html += '<div class="card" data-idx="' + idx + '">' +
        '<div class="card-header"><div class="card-title">' + a.title + '</div></div>' +
        '<div class="card-meta">' +
        '<span class="tag tag-competitor">' + a.competitor + '</span>' +
        '<span class="tag tag-type">' + a.type + '</span>' +
        '<span class="tag tag-category">' + a.category + '</span>' +
        '<span class="tag tag-date">' + a.date + '</span>' +
        '</div></div>';
    });
    container.innerHTML = html;
  }

  selCat.addEventListener('change', render);
  selComp.addEventListener('change', render);
  selType.addEventListener('change', render);
  render();

  // Detail panel with event delegation
  document.getElementById('announcements').addEventListener('click', function(e) {
    var card = e.target.closest('.card');
    if (!card) return;
    var idx = parseInt(card.getAttribute('data-idx'));
    var a = DATA[idx];
    document.getElementById('detail-title').textContent = a.title;
    document.getElementById('detail-competitor').textContent = a.competitor;
    document.getElementById('detail-category').textContent = a.category;
    document.getElementById('detail-type').textContent = a.type;
    document.getElementById('detail-date').textContent = a.date;
    document.getElementById('detail-summary').textContent = a.summary;
    document.getElementById('detail-url').innerHTML = '<a href="' + a.url + '" target="_blank" rel="noopener">' + a.url + '</a>';
    document.getElementById('detail-panel').classList.add('active');
    document.getElementById('detail-overlay').classList.add('active');
  });

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('active');
    document.getElementById('detail-overlay').classList.remove('active');
  }
  document.getElementById('close-detail').addEventListener('click', closeDetail);
  document.getElementById('detail-overlay').addEventListener('click', closeDetail);

  // CSV export
  document.getElementById('btn-csv').addEventListener('click', function() {
    var rows = [['Competitor','Category','Type','Title','Summary','Date','URL']];
    DATA.forEach(function(a) {
      rows.push([a.competitor, a.category, a.type, a.title, a.summary, a.date, a.url]);
    });
    var csv = rows.map(function(r) { return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url; link.download = 'f5_competitor_briefing_2026-03-18.csv';
    link.click(); URL.revokeObjectURL(url);
  });
})();
</script>
</body>
</html>
